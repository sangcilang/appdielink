name: link1die_mobile
description: Link1Die Document Manager Mobile App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.1
  
  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  
  # Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  
  # UI
  flutter_screenutil: ^5.9.0
  get: ^4.6.5
  
  # Utilities
  intl: ^0.19.0
  logger: ^2.0.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^2.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/images/
