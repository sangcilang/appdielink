version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: link1die-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-link1die_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: link1die-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: link1die-api
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--forwarded-allow-ips", "*"]
    env_file:
      - ../backend/.env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend/uploads:/app/uploads
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/caddy/Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: link1die-web
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env (e.g. DOMAIN=example.com)}
      EMAIL: ${EMAIL:?Set EMAIL for Let's Encrypt (e.g. EMAIL=you@example.com)}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  default:
    name: link1die-network
