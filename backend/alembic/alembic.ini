# Alembic migration environment configuration
[alembic]
script_location = alembic

[loggers]
keys = root,sqlalchemy.engine.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
